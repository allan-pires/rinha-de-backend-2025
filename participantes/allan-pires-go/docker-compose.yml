services:
  db:
    image: postgres:15-alpine
    hostname: db
    environment:
      - POSTGRES_PASSWORD=rinha123
      - POSTGRES_USER=rinha
      - POSTGRES_DB=payments
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - internal
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: "100MB"
    command: postgres -c 'max_connections=200' -c 'shared_buffers=32MB' -c 'effective_cache_size=80MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rinha -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-01: &api
    image: allanpires/rinha-backend-2025:latest
    hostname: api-01
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=rinha
      - DB_PASSWORD=rinha123
      - DB_NAME=payments
      - DEFAULT_PROCESSOR_URL=http://payment-processor-default:8080
      - FALLBACK_PROCESSOR_URL=http://payment-processor-fallback:8080
      - PORT=8080
    networks:
      - internal
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "80MB"

  api-02:
    <<: *api
    hostname: api-02

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-01
      - api-02
    ports:
      - "9999:9999"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "20MB"

networks:
  internal:
    driver: bridge
  payment-processor:
    external: true